###############################################################################
# Nginx — TLS Hardening + Security Headers + Rate Limiting
#
# Role: reverse proxy in front of the Node.js API (port 3333)
#       This config is used when deploying WITHOUT the ALB (e.g., VPS, Docker Compose).
#       With AWS ALB, TLS termination happens at the ALB — Nginx still enforces
#       security headers and upstream proxy settings.
#
# TLS configuration targets:
#   • TLS 1.2 + TLS 1.3 only (drops TLS 1.0/1.1 — PCI DSS requirement)
#   • AEAD cipher suites only (GCM, Poly1305 — no CBC, no RC4, no 3DES)
#   • HSTS: max-age=31536000 (1 year) + includeSubDomains + preload
#   • OCSP Stapling: reduces TLS handshake latency + improves privacy
#   • HTTP/2 enabled
#
# Run certificate generation (Let's Encrypt):
#   certbot certonly --nginx -d app.dominahub.com.br
###############################################################################

# Adjust to match server CPU cores (or use `auto`)
worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    ###########################################################################
    # Core security settings
    ###########################################################################

    # Hide Nginx version (reduces attacker information)
    server_tokens off;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection
    add_header X-Frame-Options "DENY" always;

    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy — don't leak URL paths to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy — disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy
    # Adjust 'connect-src' if you add analytics/CDN domains
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self';
        connect-src 'self' https://api.stripe.com;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
    " always;

    ###########################################################################
    # Rate limiting zones (edge layer — before reaching Node.js)
    ###########################################################################

    # Zone for global API rate limit: 300 req/15min per IP
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=20r/m;

    # Zone for auth endpoints: 10 req/15min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=1r/m;

    # Return 429 (not 503) when rate limit exceeded
    limit_req_status 429;

    ###########################################################################
    # Upstream (Node.js API)
    ###########################################################################

    upstream node_api {
        server 127.0.0.1:3333;

        # Health check (nginx Plus or use passive checks here)
        keepalive 64;
    }

    ###########################################################################
    # HTTP → HTTPS redirect (port 80)
    ###########################################################################

    server {
        listen 80;
        listen [::]:80;
        server_name app.dominahub.com.br;

        # ACME challenge (Let's Encrypt renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS (301 permanent)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    ###########################################################################
    # HTTPS server (port 443)
    ###########################################################################

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name app.dominahub.com.br;

        #######################################################################
        # TLS Configuration
        #######################################################################

        ssl_certificate     /etc/letsencrypt/live/app.dominahub.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.dominahub.com.br/privkey.pem;

        # TLS 1.2 + TLS 1.3 only (TLS 1.0/1.1 disabled)
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suites (AEAD only — no CBC, no RC4, no 3DES)
        # TLS 1.3 suites are controlled by OpenSSL — these apply to TLS 1.2
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;

        # Diffie-Hellman parameters (2048-bit minimum; 4096 recommended)
        # Generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096
        ssl_dhparam /etc/nginx/dhparam.pem;

        # Elliptic curves (P-256 and P-384 only)
        ssl_ecdh_curve prime256v1:secp384r1;

        # Session cache (improves performance for TLS 1.2)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;    # disable session tickets (forward secrecy)

        # OCSP Stapling (reduces handshake latency + improves privacy)
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/app.dominahub.com.br/chain.pem;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # HTTP Strict Transport Security — 1 year, include subdomains, preload
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        #######################################################################
        # Request limits
        #######################################################################

        client_max_body_size 10m;       # matches Express import limit (10 MB)
        client_body_timeout  30s;
        client_header_timeout 10s;

        # Reject oversized headers (prevents header injection attacks)
        large_client_header_buffers 4 16k;

        #######################################################################
        # Rate limiting at edge
        #######################################################################

        # Auth endpoints — strict (brute-force protection)
        location ~ ^/api/v1/auth/(login|register) {
            limit_req zone=auth_strict burst=5 nodelay;
            limit_req_log_level warn;

            proxy_pass http://node_api;
            include /etc/nginx/proxy_params;
        }

        # All other API endpoints — global limit
        location /api/ {
            limit_req zone=api_global burst=50 nodelay;
            limit_req_log_level warn;

            proxy_pass http://node_api;
            include /etc/nginx/proxy_params;
        }

        # Static frontend assets (no rate limit)
        location / {
            root /var/www/dominahub/dist;
            try_files $uri $uri/ /index.html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        #######################################################################
        # Block common attack vectors
        #######################################################################

        # Block access to hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
            return 404;
        }

        # Block common exploit paths
        location ~* (wp-admin|wp-login|xmlrpc|\.php|\.asp|\.aspx) {
            deny all;
            return 404;
        }

        #######################################################################
        # Logging
        #######################################################################

        access_log /var/log/nginx/dominahub_access.log combined;
        error_log  /var/log/nginx/dominahub_error.log warn;
    }
}
